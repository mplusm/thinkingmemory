<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="ThinkingMemory">
  <title>ThinkingMemory</title>
  <!-- associative graph: memory nodes linked to a recalled hub -->
  <g stroke="#1d1c1a" stroke-width="2.6" stroke-linecap="round">
    <line x1="32" y1="32" x2="15" y2="16"/>
    <line x1="32" y1="32" x2="50" y2="18"/>
    <line x1="32" y1="32" x2="20" y2="50"/>
    <line x1="32" y1="32" x2="49" y2="47"/>
  </g>
  <g fill="#fff8e8" stroke="#1d1c1a" stroke-width="2.6">
    <circle cx="15" cy="16" r="4.5"/>
    <circle cx="50" cy="18" r="4.5"/>
    <circle cx="20" cy="50" r="4.5"/>
    <circle cx="49" cy="47" r="4.5"/>
  </g>
  <circle cx="32" cy="32" r="7" fill="#1d1c1a"/>
</svg>
